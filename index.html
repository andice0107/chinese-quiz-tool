<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能國語教學與命題系統 (功能完整修復版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col transition-colors duration-300">

    <header class="bg-indigo-600 text-white shadow-lg py-4 px-6 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-indigo-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
                <h1 class="text-xl md:text-2xl font-black tracking-wider">AI 智能國語教學與命題系統</h1>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="relative flex-1 md:flex-initial">
                    <input type="password" id="apiKeyInput" placeholder="請輸入 Gemini API Key..." class="w-full md:w-64 px-4 py-2 bg-indigo-700 text-white rounded-lg placeholder-indigo-300 focus:outline-none focus:ring-2 focus:ring-indigo-300 transition-all text-sm">
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto p-4 md:p-6 w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
        <section class="lg:col-span-5 space-y-6">
            <div class="bg-white rounded-2xl shadow-md p-6 border border-slate-100 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-2 h-full bg-emerald-500"></div>
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="p-1.5 bg-emerald-50 text-emerald-600 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                    </span>
                    1. 課本教材解析與範圍設定
                </h2>
                <div class="space-y-4">
                    <div class="border-2 border-dashed border-slate-200 hover:border-emerald-400 rounded-xl p-4 text-center transition-all cursor-pointer relative group">
                        <input type="file" id="textbookUpload" accept=".pdf,.docx,.txt" class="absolute inset-0 opacity-0 cursor-pointer w-full">
                        <div class="space-y-1">
                            <svg class="w-8 h-8 text-slate-400 group-hover:text-emerald-500 mx-auto transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                            <p class="text-sm font-medium text-slate-700">點擊或拖入課本/教冊電子檔</p>
                            <p class="text-xs text-slate-400">支援 .pdf, .docx, .txt (繁體中文版)</p>
                        </div>
                    </div>
                    <div id="textbookStatus" class="hidden text-xs py-2 px-3 bg-emerald-50 border border-emerald-100 rounded-lg text-emerald-700 flex items-center justify-between">
                        <span class="truncate font-medium" id="textbookName"></span>
                        <button onclick="clearUploadedTextbook()" class="text-emerald-500 hover:text-emerald-700 font-bold ml-2">清除</button>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">起始頁碼 / 課次</label>
                            <input type="text" id="startRange" placeholder="例如：第7課" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">結束頁碼 / 課次</label>
                            <input type="text" id="endRange" placeholder="例如：第8課" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-md p-6 border border-slate-100 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-2 h-full bg-indigo-500"></div>
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="p-1.5 bg-indigo-50 text-indigo-600 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-2m-4-1v8m0 0l3-3m-3 3L9 8m-5 5h2.586a1 1 0 01.707.293l2.414 2.414a1 1 0 00.707.293h3.172a1 1 0 00.707-.293l2.414-2.414a1 1 0 01.707-.293H20" /></svg>
                    </span>
                    2. 命題光碟題庫匯入 (支援 PDF/Word)
                </h2>
                <div class="space-y-4">
                    <div class="border-2 border-dashed border-slate-200 hover:border-indigo-400 rounded-xl p-4 text-center transition-all cursor-pointer relative group">
                        <input type="file" id="examUpload" accept=".pdf,.docx" class="absolute inset-0 opacity-0 cursor-pointer w-full">
                        <div class="space-y-1">
                            <svg class="w-8 h-8 text-slate-400 group-hover:text-indigo-500 mx-auto transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                            <p class="text-sm font-medium text-slate-700">點擊或拖入命題光碟檔案</p>
                            <p class="text-xs text-slate-400">支援台灣廠商出之 .docx 與 .pdf 檔案</p>
                        </div>
                    </div>
                    <div id="examStatus" class="hidden text-xs py-2 px-3 bg-indigo-50 border border-indigo-100 rounded-lg text-indigo-700 flex items-center justify-between">
                        <span class="truncate font-medium" id="examName"></span>
                        <div class="flex items-center gap-2">
                            <span id="examParsedCount" class="bg-indigo-200 text-indigo-800 px-1.5 py-0.5 rounded-md font-bold">0 題</span>
                            <button onclick="clearUploadedExam()" class="text-indigo-500 hover:text-indigo-700 font-bold">清除</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-md p-6 border border-slate-100 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-2 h-full bg-violet-500"></div>
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="p-1.5 bg-violet-50 text-violet-600 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                    </span>
                    3. 教學命題參數與題型勾選
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1.5">出題總題數</label>
                        <input type="number" id="questionCount" value="10" min="1" max="100" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-violet-500">
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-slate-600 mb-2">測驗題型勾選</span>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <label class="flex items-center gap-2 p-2 hover:bg-slate-50 rounded-lg border border-slate-100 cursor-pointer">
                                <input type="checkbox" id="typePhonetics" checked class="rounded text-violet-600 focus:ring-violet-500 w-4 h-4">
                                <span>字音字形測驗</span>
                            </label>
                            <label class="flex items-center gap-2 p-2 hover:bg-slate-50 rounded-lg border border-slate-100 cursor-pointer">
                                <input type="checkbox" id="typeIdiom" checked class="rounded text-violet-600 focus:ring-violet-500 w-4 h-4">
                                <span>成語測驗</span>
                            </label>
                            <label class="flex items-center gap-2 p-2 hover:bg-slate-50 rounded-lg border border-slate-100 cursor-pointer">
                                <input type="checkbox" id="typeRhetoric" checked class="rounded text-violet-600 focus:ring-violet-500 w-4 h-4">
                                <span>修辭測驗</span>
                            </label>
                            <label class="flex items-center gap-2 p-2 hover:bg-slate-50 rounded-lg border border-slate-100 cursor-pointer">
                                <input type="checkbox" id="typeMeaning" checked class="rounded text-violet-600 focus:ring-violet-500 w-4 h-4">
                                <span>語詞意思測驗</span>
                            </label>
                            <label class="flex items-center gap-2 p-2 hover:bg-slate-50 rounded-lg border border-slate-100 cursor-pointer col-span-2">
                                <input type="checkbox" id="typeComprehension" checked class="rounded text-violet-600 focus:ring-violet-500 w-4 h-4">
                                <span>文意理解測驗</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <button id="btnGenerateExam" onclick="handleGenerateAction()" class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:from-indigo-700 hover:to-violet-700 transform hover:-translate-y-0.5 active:translate-y-0 transition-all flex items-center justify-center gap-2">
                啟動 AI 智能整合出題
            </button>
        </section>

        <section class="lg:col-span-7 flex flex-col space-y-6">
            <div id="introPanel" class="bg-white rounded-2xl shadow-md p-6 border border-slate-100 flex-1 flex flex-col items-center justify-center text-center space-y-4">
                <div class="p-4 bg-indigo-50 rounded-full text-indigo-600">
                    <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364.364l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>
                </div>
                <h3 class="text-xl font-black text-slate-800">準備好進行智能教學了嗎？</h3>
                <p class="text-slate-500 max-w-md text-sm leading-relaxed">請於左側輸入 API Key 並直接匯入命題光碟檔案。系統已支援大文本自動切片解析，保證一題不漏！</p>
            </div>

            <div id="examResultPanel" class="hidden bg-white rounded-2xl shadow-md p-6 border border-slate-100 flex-1 flex flex-col space-y-6">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-100 pb-4 gap-4">
                    <div>
                        <h3 class="text-lg font-black text-slate-800 flex items-center gap-2"><span class="w-2.5 h-2.5 bg-indigo-600 rounded-full"></span>AI 智能試卷生成完畢</h3>
                        <p class="text-xs text-slate-500 mt-1" id="examMetaText">共計 10 題</p>
                    </div>
                    <div class="flex flex-wrap gap-2 w-full md:w-auto">
                        <button onclick="startQuizMission()" class="flex-1 md:flex-none px-4 py-2.5 bg-gradient-to-r from-emerald-500 to-teal-600 text-white text-sm font-bold rounded-xl shadow-md hover:from-emerald-600 hover:to-teal-700 transition-all flex items-center justify-center gap-2">直接進入答題任務</button>
                    </div>
                </div>
                <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 max-h-[500px]" id="examQuestionsPreview"></div>
            </div>
        </section>
    </main>

    <div id="quizModal" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div id="quizConfigScreen" class="bg-white rounded-3xl max-w-md w-full shadow-2xl border border-slate-100 p-6 space-y-6">
            <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                <h3 class="text-lg font-black text-slate-800">線上答題任務設定</h3>
                <button onclick="closeQuizModal()" class="text-slate-400 hover:text-slate-600 transition-colors">✕</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">單題答題時間</label>
                    <select id="quizTimerConfig" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="0">不限時間</option>
                        <option value="15">15 秒</option>
                        <option value="30" selected>30 秒</option>
                    </select>
                </div>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 p-3 hover:bg-slate-50 rounded-xl border border-slate-100 cursor-pointer">
                        <input type="checkbox" id="quizShuffleQs" checked class="rounded text-indigo-600 focus:ring-indigo-500 w-5 h-5">
                        <span class="text-sm font-medium text-slate-800">隨機打亂題目順序</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 hover:bg-slate-50 rounded-xl border border-slate-100 cursor-pointer">
                        <input type="checkbox" id="quizShuffleOpts" checked class="rounded text-indigo-600 focus:ring-indigo-500 w-5 h-5">
                        <span class="text-sm font-medium text-slate-800">隨機打亂選項順序 (①~④)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 hover:bg-slate-50 rounded-xl border border-slate-100 cursor-pointer">
                        <input type="checkbox" id="quizRepeatWrong" class="rounded text-indigo-600 focus:ring-indigo-500 w-5 h-5">
                        <span class="text-sm font-medium text-slate-800">開啟錯題重複複習模式</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 hover:bg-slate-50 rounded-xl border border-slate-100 cursor-pointer">
                        <input type="checkbox" id="quizAllowRepeatHistory" checked class="rounded text-indigo-600 focus:ring-indigo-500 w-5 h-5">
                        <div>
                            <span class="block text-sm font-medium text-slate-800">再次出題時允許重複出已出過的題目</span>
                        </div>
                    </label>
                </div>
            </div>
            <button onclick="launchQuizPlay()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-bold py-3 rounded-xl shadow-lg flex items-center justify-center gap-2">開始挑戰答題任務</button>
        </div>

        <div id="quizPlayScreen" class="hidden bg-white rounded-3xl max-w-2xl w-full shadow-2xl border border-slate-100 p-6 flex flex-col h-[90vh] md:h-auto max-h-[750px] relative overflow-hidden">
            <div id="quizPauseOverlay" class="hidden absolute inset-0 z-30 bg-slate-900/40 backdrop-blur-xl flex flex-col items-center justify-center space-y-6">
                <h3 class="text-xl font-black text-white">挑戰暫停中</h3>
                <button onclick="resumeQuizPlay()" class="py-2.5 w-48 bg-emerald-500 text-white font-bold rounded-xl shadow-md">繼續作答</button>
            </div>

            <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                <div class="flex items-center gap-2">
                    <span class="text-sm font-black text-slate-500" id="quizProgressText">第 1 題</span>
                    <button onclick="speakCurrentQuestion()" class="p-1.5 bg-slate-100 rounded-full">🗣️ 朗讀題目</button>
                    <button onclick="pauseQuizPlay()" class="p-1.5 bg-slate-100 rounded-full">⏸️ 暫停</button>
                </div>
                <div id="quizTimerContainer" class="flex items-center gap-2">
                    <span class="text-sm font-bold text-slate-500 font-mono" id="quizTimerText">30s</span>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar my-6 space-y-6">
                <span id="quizQuestionTag" class="inline-block px-2.5 py-1 bg-indigo-50 text-indigo-700 text-xs font-bold rounded-md"></span>
                <h4 id="quizQuestionBody" class="text-lg md:text-xl font-bold text-slate-800 leading-relaxed"></h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3" id="quizOptionsGrid"></div>
            </div>

            <div id="quizFeedbackArea" class="hidden border-t border-slate-100 pt-4 space-y-3">
                <div class="flex items-center gap-2 font-bold" id="quizFeedbackStatus"></div>
                <p class="text-sm text-slate-600 leading-relaxed" id="quizFeedbackExplain"></p>
                <button onclick="handleQuizNextQuestion()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl">下一題</button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex flex-col items-center justify-center space-y-4">
        <div class="rounded-full border-4 border-slate-300 border-t-indigo-600 animate-spin w-12 h-12"></div>
        <p class="text-white font-bold text-sm" id="loadingText"></p>
    </div>
    <div id="toastNotification" class="fixed bottom-5 right-5 z-50 bg-slate-800 text-white text-sm py-3 px-5 rounded-xl shadow-lg flex items-center gap-2 transition-all opacity-0">
        <span id="toastText"></span>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let G_apiKey = "", G_textbookText = "";
        let G_examQuestions = [], G_parsedExamQuestions = [], G_seenQuestionTexts = new Set();
        let G_quizCurrentIndex = 0, G_quizQuestions = [], G_quizTimerValue = 0, G_quizTimerInterval = null, G_quizWrongList = [], G_quizCurrentMapping = {};

        function showToast(text) {
            const toast = document.getElementById('toastNotification');
            document.getElementById('toastText').textContent = text;
            toast.style.opacity = "1";
            setTimeout(() => { toast.style.opacity = "0"; }, 3000);
        }
        function toggleLoading(show, text) {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').textContent = text;
            show ? overlay.classList.remove('hidden') : overlay.classList.add('hidden');
        }
        function getApiKey() { return document.getElementById('apiKeyInput').value.trim() || G_apiKey; }

        document.getElementById('textbookUpload').addEventListener('change', async function(e) {
            const file = e.target.files[0]; if (!file) return;
            toggleLoading(true, "正在讀取電子教材內容...");
            try {
                if (file.name.endsWith('.pdf')) {
                    const arrayBuffer = await file.arrayBuffer();
                    const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
                    const pdf = await loadingTask.promise;
                    let fullText = "";
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join(' ') + "\n";
                    }
                    G_textbookText = fullText;
                } else if (file.name.endsWith('.docx')) {
                    const arrayBuffer = await file.arrayBuffer();
                    const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                    G_textbookText = result.value;
                }
                document.getElementById('textbookName').textContent = file.name;
                document.getElementById('textbookStatus').classList.remove('hidden');
                showToast("教材匯入成功！");
            } catch (err) { showToast("教材讀取失敗"); } finally { toggleLoading(false); }
        });

        document.getElementById('examUpload').addEventListener('change', async function(e) {
            const file = e.target.files[0]; if (!file) return;
            if (!getApiKey()) { showToast("請先輸入 API Key"); e.target.value = ''; return; }
            
            toggleLoading(true, "正在智能提取原始文件文字...");
            try {
                let rawText = "";
                if (file.name.endsWith('.pdf')) {
                    const arrayBuffer = await file.arrayBuffer();
                    const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
                    const pdf = await loadingTask.promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        rawText += textContent.items.map(item => item.str).join(' ') + "\n";
                    }
                } else if (file.name.endsWith('.docx')) {
                    const arrayBuffer = await file.arrayBuffer();
                    const zip = await JSZip.loadAsync(arrayBuffer);
                    const docXmlText = await zip.file("word/document.xml").async("text");
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(docXmlText, "text/xml");
                    
                    const paragraphs = xmlDoc.getElementsByTagName("*");
                    for (let node of paragraphs) {
                        if (node.localName === "p") {
                            let pText = "";
                            const childNodes = node.getElementsByTagName("*");
                            for (let child of childNodes) {
                                if (child.localName === "ruby") {
                                    const baseNodes = child.getElementsByTagName("*");
                                    let baseStr = "", rtStr = "";
                                    for (let n of baseNodes) {
                                        if (n.localName === "rubyBase") {
                                            const tNodes = n.getElementsByTagName("*");
                                            for (let t of tNodes) { if (t.localName === "t") baseStr += t.textContent; }
                                        }
                                        if (n.localName === "rt") {
                                            const tNodes = n.getElementsByTagName("*");
                                            for (let t of tNodes) { if (t.localName === "t") rtStr += t.textContent; }
                                        }
                                    }
                                    if (baseStr) { pText += rtStr ? `${baseStr}(${rtStr})` : baseStr; }
                                } else if (child.localName === "t") {
                                    let parent = child.parentNode; let isInRuby = false;
                                    while (parent) {
                                        if (parent.localName === "ruby" || parent.localName === "rt" || parent.localName === "rubyBase") { isInRuby = true; break; }
                                        parent = parent.parentNode;
                                    }
                                    if (!isInRuby) { pText += child.textContent; }
                                }
                            }
                            if (pText.trim()) rawText += pText + "\n";
                        }
                    }
                }

                if (!rawText.trim()) { throw new Error("Text empty"); }

                const lines = rawText.split('\n').filter(l => l.trim().length > 0);
                let textChunks = []; let currentChunk = "";
                for (let line of lines) {
                    currentChunk += line + "\n";
                    if (currentChunk.length > 5000) { textChunks.push(currentChunk); currentChunk = ""; }
                }
                if (currentChunk) textChunks.push(currentChunk);

                G_parsedExamQuestions = [];
                for (let i = 0; i < textChunks.length; i++) {
                    toggleLoading(true, `正在解析精準題庫 (進度: ${Math.round(((i+1)/textChunks.length)*100)}%)...`);
                    const chunkQs = await parseExamChunkWithAI(textChunks[i], getApiKey());
                    if (chunkQs && chunkQs.length > 0) {
                        G_parsedExamQuestions = G_parsedExamQuestions.concat(chunkQs);
                        document.getElementById('examParsedCount').textContent = `${G_parsedExamQuestions.length} 題`;
                    }
                    if (i < textChunks.length - 1) { await new Promise(resolve => setTimeout(resolve, 1500)); }
                }
                document.getElementById('examName').textContent = file.name;
                document.getElementById('examStatus').classList.remove('hidden');
                showToast(`超大題庫完美解析完畢，共成功導入 ${G_parsedExamQuestions.length} 題！`);
            } catch (err) { showToast("題庫內文提取失敗"); } finally { toggleLoading(false); }
        });

        async function parseExamChunkWithAI(textSegment, apiKey) {
            const systemPrompt = `你是一個專業的台灣國小國語科結構化助手。請將傳入的考題文本片段轉為標準 JSON 陣列。
【100% 教學現場原樣還原規範】：
1. 題幹與選項字體字形必須與原始題庫100%完全原樣一致。原本是國字（如：助、赤、自、緻）就必須絕對維持國字，不准擅自轉為注音！
2. 只有當大題分類是選錯別字、寫國字（字形題）時，才需在題幹中將答案字挖空為「□」。
3. 如果是字音題（注音題，如問：『緻』的注音為何？或問某組字音是否相同？），題幹與選項中的國字必須完美完整保留，絕對不准用『□』遮蔽！
JSON結構：
[
  {
    "category": "字音字形/基本修辭/文意理解",
    "question": "完整題目敘述",
    "options": ["選項1","選項2","選項3","選項4"],
    "answer": 1~4的數字,
    "explain": "台灣標準注音詳解說明"
  }
]`;
            const payload = {
                contents: [{ parts: [{ text: textSegment }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { responseMimeType: "application/json" }
            };
            const data = await callGeminiAPI(payload, apiKey);
            try { return JSON.parse(data.candidates[0].content.parts[0].text); } catch(e) { return []; }
        }

        async function handleGenerateAction() {
            if (!getApiKey()) { showToast("請先輸入 API Key"); return; }
            const targetCount = parseInt(document.getElementById('questionCount').value) || 10;
            toggleLoading(true, "正在篩選整合試卷考題...");
            try {
                let pool = JSON.parse(JSON.stringify(G_parsedExamQuestions));
                pool.sort(() => Math.random() - 0.5);
                G_examQuestions = pool.slice(0, targetCount);
                renderQuestionsPreview();
                showToast("考題試卷整合完畢！");
            } catch (e) { showToast("出題失敗"); } finally { toggleLoading(false); }
        }

        function renderQuestionsPreview() {
            document.getElementById('introPanel').classList.add('hidden');
            document.getElementById('examResultPanel').classList.remove('hidden');
            const container = document.getElementById('examQuestionsPreview'); container.innerHTML = '';
            G_examQuestions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = "p-4 mb-4 bg-slate-50 rounded-xl border border-slate-100 text-sm";
                card.innerHTML = `
                    <div class="font-bold mb-1">[${q.category}] Q${idx+1}. (  ) ${q.question}</div>
                    <div class="grid grid-cols-2 gap-1 text-xs text-slate-600 mb-2">
                        <div>① ${q.options[0]}</div><div>② ${q.options[1]}</div><div>③ ${q.options[2]}</div><div>④ ${q.options[3]}</div>
                    </div>
                    <div class="text-xs text-indigo-700 bg-indigo-50 p-2 rounded">正解：選項 ${q.answer} | 詳解：${q.explain||'無'}</div>`;
                container.appendChild(card);
            });
        }

        function startQuizMission() { document.getElementById('quizModal').classList.remove('hidden'); }
        function closeQuizModal() { document.getElementById('quizModal').classList.add('hidden'); clearInterval(G_quizTimerInterval); }

        function launchQuizPlay() {
            document.getElementById('quizConfigScreen').classList.add('hidden');
            document.getElementById('quizPlayScreen').classList.remove('hidden');
            
            // 【核心邏輯回補】：根據 quizAllowRepeatHistory 是否打勾，決定是否過濾做過的考題
            const allowRepeatHistory = document.getElementById('quizAllowRepeatHistory').checked;
            let pool = JSON.parse(JSON.stringify(G_examQuestions));
            
            if (!allowRepeatHistory) {
                const filtered = pool.filter(q => !G_seenQuestionTexts.has(q.question));
                if (filtered.length === 0) {
                    showToast("本大題內歷史題目均已抽過，自動清空本機排重歷史重新載入！");
                    G_seenQuestionTexts.clear();
                } else { pool = filtered; }
            }

            G_quizQuestions = pool;
            if (document.getElementById('quizShuffleQs').checked) G_quizQuestions.sort(() => Math.random() - 0.5);
            G_quizCurrentIndex = 0; G_quizWrongList = [];
            loadQuizQuestion(G_quizCurrentIndex);
        }

        function loadQuizQuestion(index) {
            if (index >= G_quizQuestions.length) {
                if (document.getElementById('quizRepeatWrong').checked && G_quizWrongList.length > 0) {
                    G_quizQuestions = JSON.parse(JSON.stringify(G_quizWrongList)); G_quizWrongList = []; G_quizCurrentIndex = 0; loadQuizQuestion(0); return;
                }
                finishQuizPlay(); return;
            }
            const q = G_quizQuestions[index];
            document.getElementById('quizProgressText').textContent = `第 ${index + 1} / ${G_quizQuestions.length} 題`;
            document.getElementById('quizQuestionTag').textContent = q.category;
            document.getElementById('quizQuestionBody').textContent = q.question;

            let optionsObj = q.options.map((text, idx) => ({ text, originIndex: idx + 1 }));
            if (document.getElementById('quizShuffleOpts').checked) optionsObj.sort(() => Math.random() - 0.5);

            G_quizCurrentMapping = {};
            optionsObj.forEach((opt, idx) => { G_quizCurrentMapping[opt.originIndex] = idx + 1; });

            const grid = document.getElementById('quizOptionsGrid'); grid.innerHTML = '';
            optionsObj.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border border-slate-200 hover:bg-slate-50 text-sm font-medium transition-all";
                btn.onclick = () => handleSelectOption(opt.originIndex, q.answer, q);
                btn.textContent = `${idx + 1}. ${opt.text}`;
                grid.appendChild(btn);
            });
            document.getElementById('quizFeedbackArea').classList.add('hidden');
            startQuizTimer();
        }

        function startQuizTimer() {
            clearInterval(G_quizTimerInterval);
            let limit = parseInt(document.getElementById('quizTimerConfig').value) || 0;
            if (limit === 0) { document.getElementById('quizTimerContainer').classList.add('hidden'); return; }
            document.getElementById('quizTimerContainer').classList.remove('hidden');
            G_quizTimerValue = limit; document.getElementById('quizTimerText').textContent = `${G_quizTimerValue}s`;
            G_quizTimerInterval = setInterval(() => {
                G_quizTimerValue--; document.getElementById('quizTimerText').textContent = `${G_quizTimerValue}s`;
                if (G_quizTimerValue <= 0) { clearInterval(G_quizTimerInterval); handleTimeOut(); }
            }, 1000);
        }

        function pauseQuizPlay() { clearInterval(G_quizTimerInterval); document.getElementById('quizPauseOverlay').classList.remove('hidden'); }
        function resumeQuizPlay() { document.getElementById('quizPauseOverlay').classList.add('hidden'); startQuizTimer(); }

        function handleSelectOption(chosenIdx, correctIdx, questionObj) {
            clearInterval(G_quizTimerInterval);
            G_seenQuestionTexts.add(questionObj.question); // 寫入作答歷史記錄
            const isCorrect = (chosenIdx === correctIdx);
            if (!isCorrect) G_quizWrongList.push(questionObj);
            
            const correctShuffledIdx = G_quizCurrentMapping[correctIdx];
            let rewrittenExplain = questionObj.explain || "";
            if (document.getElementById('quizShuffleOpts').checked && rewrittenExplain) {
                const circles = ['①', '②', '③', '④'];
                circles.forEach((sym, i) => { rewrittenExplain = rewrittenExplain.replaceAll(sym, `__OPT${i+1}__`); });
                for (let i = 1; i <= 4; i++) { rewrittenExplain = rewrittenExplain.replaceAll(`__OPT${i}__`, circles[G_quizCurrentMapping[i] - 1]); }
            }
            showQuizFeedback(isCorrect, correctShuffledIdx, rewrittenExplain, questionObj.options, correctIdx);
        }

        function handleTimeOut() {
            const q = G_quizQuestions[G_quizCurrentIndex]; G_quizWrongList.push(q); G_seenQuestionTexts.add(q.question);
            showQuizFeedback(false, G_quizCurrentMapping[q.answer], q.explain, q.options, q.answer);
        }

        function showQuizFeedback(isCorrect, correctShuffledIdx, explainText, options, originalCorrectIdx) {
            const area = document.getElementById('quizFeedbackArea'); area.classList.remove('hidden');
            const status = document.getElementById('quizFeedbackStatus');
            status.className = isCorrect ? "text-emerald-600 font-bold" : "text-rose-600 font-bold";
            status.textContent = isCorrect ? "🎉 答對了！非常優秀！" : `❌ 答錯了！(正確解答為：選項 ${correctShuffledIdx}. ${options[originalCorrectIdx-1]})`;
            document.getElementById('quizFeedbackExplain').textContent = `詳解說明：${explainText||'無'}`;
        }

        function handleQuizNextQuestion() { G_quizCurrentIndex++; loadQuizQuestion(G_quizCurrentIndex); }
        function finishQuizPlay() { document.getElementById('quizPlayScreen').classList.add('hidden'); document.getElementById('quizScoreScreen').classList.remove('hidden'); document.getElementById('quizScoreText').textContent = "挑戰完畢"; }

        function speakCurrentQuestion() {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(G_quizQuestions[G_quizCurrentIndex].question);
            u.lang = "zh-TW"; u.rate = 0.9; window.speechSynthesis.speak(u);
        }

        async function callGeminiAPI(payload, apiKey) {
            const models = ["gemini-2.5-flash", "gemini-2.5-flash-preview-09-2025", "gemini-1.5-flash"];
            for (let model of models) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });
                    if (res.ok) return await res.json();
                } catch (e) {}
            }
            throw new Error();
        }
        function clearUploadedTextbook() { document.getElementById('textbookUpload').value = ''; document.getElementById('textbookStatus').classList.add('hidden'); G_textbookText = ""; }
        function clearUploadedExam() { document.getElementById('examUpload').value = ''; document.getElementById('examStatus').classList.add('hidden'); G_parsedExamQuestions = []; }
    </script>
</body>
