<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>國語智慧自動偵測出題系統</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link class="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;950&display=swap');
    body {
      font-family: 'Noto Sans TC', sans-serif;
      overflow: hidden;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #0f172a;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col antialiased select-none relative">

  <!-- 拖曳檔案全螢幕提示遮罩 -->
  <div id="drag-drop-overlay" class="fixed inset-0 bg-indigo-950/90 backdrop-blur-md z-50 flex flex-col items-center justify-center border-4 border-dashed border-indigo-500 m-4 rounded-3xl transition-opacity duration-200 pointer-events-none opacity-0">
    <div class="text-center p-8 bg-slate-900/80 rounded-2xl border border-slate-800 shadow-2xl max-w-sm">
      <div class="inline-block p-5 bg-indigo-600 text-white rounded-full text-5xl mb-4 animate-bounce">
        <i class="fa-solid fa-file-arrow-up"></i>
      </div>
      <h3 class="text-xl font-black text-white mb-2">放開滑鼠以匯入 PDF</h3>
      <p class="text-xs text-slate-400">系統將會立即開啟自動排版分析，幫您提取國語考題！</p>
    </div>
  </div>

  <header class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex flex-wrap items-center justify-between shadow-lg shrink-0 z-20 w-full">
    <div class="flex items-center space-x-3 mb-2 md:mb-0">
      <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-md shadow-indigo-500/20">
        <i class="fa-solid fa-graduation-cap text-xl animate-bounce"></i>
      </div>
      <div>
        <h1 class="text-lg font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">國語智慧免設定截圖出題系統</h1>
        <p class="text-xs text-slate-400 font-medium">支援檔案拖曳 ‧ 智慧橫向像素投影分割 ‧ 歷史不重複</p>
      </div>
    </div>

    <!-- 狀態與進度指示器 -->
    <div id="parsing-status-panel" class="hidden items-center space-x-3 bg-slate-950 px-4 py-2 rounded-xl border border-slate-800 text-xs text-slate-300">
      <i class="fa-solid fa-spinner animate-spin text-cyan-400"></i>
      <span>背景自動辨識中：已解析 <strong id="parsed-pages-count" class="text-cyan-400 font-mono">0</strong> / <strong id="total-pages-count" class="text-slate-400 font-mono">0</strong> 頁 (累計 <strong id="total-detected-questions" class="text-indigo-400 font-mono">0</strong> 題)</span>
    </div>

    <!-- 控制與設定區 -->
    <div class="flex items-center space-x-2">
      <label class="cursor-pointer bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white px-4 py-2 rounded-xl text-xs font-black shadow-lg shadow-indigo-600/10 transition flex items-center space-x-2">
        <i class="fa-solid fa-file-pdf"></i>
        <span>一鍵匯入 PDF</span>
        <input type="file" id="pdf-uploader" accept="application/pdf" class="hidden" onchange="handlePdfUpload(event)">
      </label>
      
      <button onclick="triggerDemoMode()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-2 rounded-xl text-xs font-bold border border-slate-700 transition flex items-center space-x-1">
        <i class="fa-solid fa-star text-amber-400"></i>
        <span>載入示範卷</span>
      </button>
    </div>
  </header>

  <div id="toast-container" class="fixed top-5 right-5 z-50 pointer-events-none space-y-2"></div>

  <!-- 主出題面板：題目在上，答案在下，完全無左右留白 -->
  <main id="exam-workspace" class="flex-1 flex flex-col divide-y divide-slate-800 overflow-hidden w-full relative bg-slate-950">

    <!-- 題目截圖專區 (上，佔 55% 空間) -->
    <div class="flex flex-col overflow-hidden relative group" style="flex: 55 55 0%;">
      <!-- 視窗標籤 -->
      <div class="absolute top-3 left-3 bg-blue-600/90 backdrop-blur text-white text-[11px] font-black px-3 py-1.5 rounded-lg shadow-md z-10 flex items-center space-x-1.5 border border-blue-400/20">
        <span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
        <span>當前隨機題目</span>
      </div>

      <!-- 題目微調控制懸浮面板 -->
      <div class="absolute bottom-3 left-3 bg-slate-900/95 backdrop-blur border border-slate-700 p-3 rounded-xl shadow-2xl z-10 hidden group-hover:block transition-all duration-200">
        <div class="flex flex-col space-y-2">
          <div class="flex items-center space-x-2">
            <span class="text-[10px] font-bold text-slate-400 w-8">縮放</span>
            <input type="range" id="zoom-q-slider" min="0.5" max="3.0" step="0.05" value="1.0" oninput="adjustExamZoom('q', this.value)" class="w-24 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-indigo-500">
            <span id="zoom-q-val" class="text-[10px] font-mono text-slate-400 w-8 text-right">100%</span>
          </div>
          <div class="flex items-center space-x-2">
            <span class="text-[10px] font-bold text-slate-400 w-8">外擴</span>
            <input type="range" id="pad-q-slider" min="0" max="100" step="1" value="10" oninput="adjustExamPadding('q', this.value)" class="w-24 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-indigo-500">
            <span id="pad-q-val" class="text-[10px] font-mono text-slate-400 w-8 text-right">10px</span>
          </div>
          <div class="flex justify-between items-center text-[9px] text-slate-500 pt-1.5 border-t border-slate-800">
            <span>按住滑鼠左鍵可拖移微調</span>
            <button onclick="resetExamOffsets('q')" class="hover:text-red-400"><i class="fa-solid fa-redo"></i> 重設</button>
          </div>
        </div>
      </div>

      <!-- 題目 Canvas 容器 -->
      <div id="exam-q-container" class="flex-1 flex items-center justify-center bg-slate-950 overflow-hidden relative cursor-grab active:cursor-grabbing" onmousedown="startExamPan(event, 'q')" ontouchstart="startExamPan(event, 'q')">
        <div id="exam-q-inner" class="relative group/canvas">
          <canvas id="exam-q-canvas" style="max-width: 100%; max-height: 100%; object-fit: contain; display: block;"></canvas>
          <!-- 題目奈米級邊框拉動手把圖層 -->
          <div id="exam-q-resize-frame" class="absolute inset-0 border-2 border-dashed border-blue-500/80 pointer-events-none opacity-0 group-hover/canvas:opacity-100 transition-opacity duration-150 z-20">
            <div class="resize-handle top-left absolute -top-1.5 -left-1.5 w-3.5 h-3.5 bg-blue-600 border-2 border-white rounded-full cursor-nwse-resize pointer-events-auto shadow-md" data-handle="top-left" data-target="q"></div>
            <div class="resize-handle top absolute -top-1.5 left-1/2 -translate-x-1/2 w-3.5 h-3.5 bg-blue-600 border-2 border-white rounded-full cursor-ns-resize pointer-events-auto shadow-md" data-handle="top" data-target="q"></div>
            <div class="resize-handle top-right absolute -top-1.5 -right-1.5 w-3.5 h-3.5 bg-blue-600 border-2 border-white rounded-full cursor-nesw-resize pointer-events-auto shadow-md" data-handle="top-right" data-target="q"></div>
            <div class="resize-handle right absolute top-1/2 -translate-y-1/2 -right-1.5 w-3.5 h-3.5 bg-blue-600 border-2 border-white rounded-full cursor-ew-resize pointer-events-auto shadow-md" data-handle="right" data-target="q"></div>
            <div class="resize-handle bottom-right absolute -bottom-1.5 -right-1.5 w-3.5 h-3.5 bg-blue-600 border-2 border-white rounded-full cursor-nwse-resize pointer-events-auto shadow-md" data-handle="bottom-right" data-target="q"></div>
            <div class="resize-handle bottom absolute -bottom-1.5 left-1/2 -translate-x-1/2 w-3.5 h-3.5 bg-blue-600 border-2 border-white rounded-full cursor-ns-resize pointer-events-auto shadow-md" data-handle="bottom" data-target="q"></div>
            <div class="resize-handle bottom-left absolute -bottom-1.5 -left-1.5 w-3.5 h-3.5 bg-blue-600 border-2 border-white rounded-full cursor-nesw-resize pointer-events-auto shadow-md" data-handle="bottom-left" data-target="q"></div>
            <div class="resize-handle left absolute top-1/2 -translate-y-1/2 -left-1.5 w-3.5 h-3.5 bg-blue-600 border-2 border-white rounded-full cursor-ew-resize pointer-events-auto shadow-md" data-handle="left" data-target="q"></div>
          </div>
        </div>
        
        <!-- 初始狀態指引遮罩 -->
        <div id="exam-q-placeholder" class="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center z-10 p-6 text-center">
          <div class="text-slate-800 text-7xl mb-4"><i class="fa-solid fa-cloud-arrow-up animate-bounce"></i></div>
          <h4 class="text-md font-black text-slate-400 mb-1">請匯入 PDF 題庫或載入示範卷</h4>
          <p class="text-xs text-slate-600 max-w-xs leading-relaxed">可直接拖曳 PDF 檔案至視窗內任何位置，系統將在後台自動切分，並立即開啟隨機出題！</p>
        </div>
      </div>
    </div>

    <!-- 解析與答案專區 (下，佔 45% 空間，預設遮蔽) -->
    <div id="exam-answer-panel" class="flex flex-col overflow-hidden relative group bg-slate-950" style="flex: 45 45 0%;">
      <!-- 視窗標籤 -->
      <div class="absolute top-3 left-3 bg-emerald-600/90 backdrop-blur text-white text-[11px] font-black px-3 py-1.5 rounded-lg shadow-md z-10 flex items-center space-x-1.5 border border-emerald-400/20">
        <span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
        <span>解析與答案</span>
      </div>

      <!-- 答案微調控制懸浮面板 -->
      <div class="absolute bottom-3 left-3 bg-slate-900/95 backdrop-blur border border-slate-700 p-3 rounded-xl shadow-2xl z-10 hidden group-hover:block transition-all duration-200">
        <div class="flex flex-col space-y-2">
          <div class="flex items-center space-x-2">
            <span class="text-[10px] font-bold text-slate-400 w-8">縮放</span>
            <input type="range" id="zoom-a-slider" min="0.5" max="3.0" step="0.05" value="1.0" oninput="adjustExamZoom('a', this.value)" class="w-24 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-indigo-500">
            <span id="zoom-a-val" class="text-[10px] font-mono text-slate-400 w-8 text-right">100%</span>
          </div>
          <div class="flex items-center space-x-2">
            <span class="text-[10px] font-bold text-slate-400 w-8">外擴</span>
            <input type="range" id="pad-a-slider" min="0" max="100" step="1" value="10" oninput="adjustExamPadding('a', this.value)" class="w-24 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-indigo-500">
            <span id="pad-a-val" class="text-[10px] font-mono text-slate-400 w-8 text-right">10px</span>
          </div>
          <div class="flex justify-between items-center text-[9px] text-slate-500 pt-1.5 border-t border-slate-800">
            <span>按住滑鼠左鍵可拖移微調</span>
            <button onclick="resetExamOffsets('a')" class="hover:text-red-400"><i class="fa-solid fa-redo"></i> 重設</button>
          </div>
        </div>
      </div>

      <!-- 答案 Canvas 容器 -->
      <div id="exam-a-container" class="flex-1 flex items-center justify-center bg-slate-950 overflow-hidden relative cursor-grab active:cursor-grabbing" onmousedown="startExamPan(event, 'a')" ontouchstart="startExamPan(event, 'a')">
        <div id="exam-a-inner" class="relative group/canvas">
          <canvas id="exam-a-canvas" style="max-width: 100%; max-height: 100%; object-fit: contain; display: block;"></canvas>
          <!-- 答案奈米級邊框拉動手把圖層 -->
          <div id="exam-a-resize-frame" class="absolute inset-0 border-2 border-dashed border-emerald-500/80 pointer-events-none opacity-0 group-hover/canvas:opacity-100 transition-opacity duration-150 z-20">
            <div class="resize-handle top-left absolute -top-1.5 -left-1.5 w-3.5 h-3.5 bg-emerald-600 border-2 border-white rounded-full cursor-nwse-resize pointer-events-auto shadow-md" data-handle="top-left" data-target="a"></div>
            <div class="resize-handle top absolute -top-1.5 left-1/2 -translate-x-1/2 w-3.5 h-3.5 bg-emerald-600 border-2 border-white rounded-full cursor-ns-resize pointer-events-auto shadow-md" data-handle="top" data-target="a"></div>
            <div class="resize-handle top-right absolute -top-1.5 -right-1.5 w-3.5 h-3.5 bg-emerald-600 border-2 border-white rounded-full cursor-nesw-resize pointer-events-auto shadow-md" data-handle="top-right" data-target="a"></div>
            <div class="resize-handle right absolute top-1/2 -translate-y-1/2 -right-1.5 w-3.5 h-3.5 bg-emerald-600 border-2 border-white rounded-full cursor-ew-resize pointer-events-auto shadow-md" data-handle="right" data-target="a"></div>
            <div class="resize-handle bottom-right absolute -bottom-1.5 -right-1.5 w-3.5 h-3.5 bg-emerald-600 border-2 border-white rounded-full cursor-nwse-resize pointer-events-auto shadow-md" data-handle="bottom-right" data-target="a"></div>
            <div class="resize-handle bottom absolute -bottom-1.5 left-1/2 -translate-x-1/2 w-3.5 h-3.5 bg-emerald-600 border-2 border-white rounded-full cursor-ns-resize pointer-events-auto shadow-md" data-handle="bottom" data-target="a"></div>
            <div class="resize-handle bottom-left absolute -bottom-1.5 -left-1.5 w-3.5 h-3.5 bg-emerald-600 border-2 border-white rounded-full cursor-nesw-resize pointer-events-auto shadow-md" data-handle="bottom-left" data-target="a"></div>
            <div class="resize-handle left absolute top-1/2 -translate-y-1/2 -left-1.5 w-3.5 h-3.5 bg-emerald-600 border-2 border-white rounded-full cursor-ew-resize pointer-events-auto shadow-md" data-handle="left" data-target="a"></div>
          </div>
        </div>
        
        <!-- 答案安全灰色實體色塊遮罩 (預設無漸變動畫，徹底排除漏底機率) -->
        <div id="exam-a-masked-layer" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center z-10 p-6" style="display: flex;">
          <div class="text-indigo-500/20 text-7xl mb-4"><i class="fa-solid fa-eye-slash"></i></div>
          <h4 class="text-md font-bold text-slate-400 mb-1">答案解析已安全屏蔽</h4>
          <p class="text-xs text-slate-600">請按下方「顯示解析與答案」解鎖</p>
        </div>

        <!-- 初始狀態預設遮罩 -->
        <div id="exam-a-placeholder" class="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center z-15 p-6 text-center">
          <div class="text-slate-800 text-6xl mb-4"><i class="fa-solid fa-lock"></i></div>
          <h4 class="text-md font-bold text-slate-500">等待抽題</h4>
        </div>
      </div>
    </div>

  </main>

  <footer class="bg-slate-900 border-t border-slate-800 px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4 shrink-0 z-20 w-full shadow-2xl">
    <!-- 歷史進度條 -->
    <div class="flex items-center space-x-3 w-full md:w-auto">
      <span class="text-xs text-slate-400 font-bold">出題進度:</span>
      <div class="w-48 bg-slate-950 rounded-full h-2 overflow-hidden border border-slate-800 relative">
        <div id="history-progress" class="bg-gradient-to-r from-emerald-500 to-teal-500 h-full transition-all duration-300" style="width: 0%"></div>
      </div>
      <span id="history-text" class="text-xs text-slate-300 font-mono">0 / 0 題已回答</span>
      <button onclick="resetHistory()" class="text-slate-500 hover:text-red-400 transition text-xs font-bold pl-1" title="重設出題歷史紀錄"><i class="fa-solid fa-rotate-left"></i> 重設歷史</button>
    </div>

    <!-- 雙核出題控制大按鈕 -->
    <div class="flex items-center space-x-3 w-full md:w-auto justify-end">
      <!-- 上一題按鈕 -->
      <button id="btn-prev-question" onclick="drawPrevQuestion()" disabled class="w-full md:w-auto px-6 py-3.5 bg-slate-800 hover:bg-slate-700 disabled:opacity-40 disabled:hover:bg-slate-800 text-slate-300 rounded-xl text-sm font-black transition-all duration-150 flex items-center justify-center space-x-2">
        <i class="fa-solid fa-chevron-left"></i>
        <span>上一題</span>
      </button>

      <!-- 顯示解答鍵 -->
      <button id="btn-toggle-answer" onclick="toggleAnswerVisibility()" disabled class="w-full md:w-auto px-6 py-3.5 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 disabled:hover:bg-indigo-600 text-white rounded-xl text-sm font-black shadow-lg shadow-indigo-600/15 transition-all duration-150 flex items-center justify-center space-x-2">
        <i class="fa-solid fa-eye" id="eye-icon"></i>
        <span id="answer-btn-text">顯示解析與答案</span>
      </button>

      <!-- 隨機下一題鍵 -->
      <button id="btn-next-question" onclick="drawRandomQuestion()" disabled class="w-full md:w-auto px-8 py-3.5 bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 disabled:from-emerald-600/40 disabled:to-teal-500/40 text-white rounded-xl text-sm font-black shadow-lg shadow-emerald-600/20 transition-all duration-150 flex items-center justify-center space-x-2">
        <span>隨機下一題</span>
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>
  </footer>

  <script>
    let pdfDoc = null;
    let totalPages = 0;
    
    // 全域線條暫存：[{ pageNum, y, elements, text }]
    let globalLines = [];
    let pageHeights = {};
    let heuristicQuestions = [];
    
    // 儲存解析到的所有題目座標：{ id, title, qParts: [{pageNum, box}], aParts: [{pageNum, box}] }
    let questions = [];
    // 紀錄已經出過、回答過的題目 ID 與歷史指標，防止重複，並提供上一題功能
    let answeredHistory = [];
    let historyPointer = -1;
    
    let currentExamIndex = -1;
    let showAnswer = false;
    
    // 每一題自適應微調
    let examOffsets = {
      q: { x: 0, y: 0, scale: 1.0, padding: 10 },
      a: { x: 0, y: 0, scale: 1.0, padding: 10 }
    };
    
    let isPanning = false;
    let panTarget = 'q';
    let lastPanX = 0, lastPanY = 0;

    // 跨頁未解題目的暫存狀態
    let activeQ = null;
    
    // 延遲渲染定時器，用於完全杜絕跳題時的漏底閃爍
    let answerRenderTimeout = null;

    // 高效 Canvas 離屏快取（解決即時拖拉邊框的流暢度與避免頻繁調用 PDF.js）
    let cachedCanvasesQ = [];
    let cachedCanvasesA = [];
    let currentBestRatioQ = 1.0;
    let currentBestRatioA = 1.0;

    // ==========================================
    // 拖拉上傳 PDF 功能綁定
    // ==========================================
    window.addEventListener('dragenter', function(e) {
      e.preventDefault();
      document.getElementById('drag-drop-overlay').classList.remove('opacity-0');
    });

    window.addEventListener('dragover', function(e) {
      e.preventDefault();
    });

    window.addEventListener('dragleave', function(e) {
      if (e.clientX <= 0 || e.clientY <= 0 || e.clientX >= window.innerWidth || e.clientY >= window.innerHeight) {
        document.getElementById('drag-drop-overlay').classList.add('opacity-0');
      }
    });

    window.addEventListener('drop', function(e) {
      e.preventDefault();
      document.getElementById('drag-drop-overlay').classList.add('opacity-0');
      
      if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        const file = e.dataTransfer.files[0];
        if (file.type === 'application/pdf') {
          const uploader = document.getElementById('pdf-uploader');
          
          const dataTransfer = new DataTransfer();
          dataTransfer.items.add(file);
          uploader.files = dataTransfer.files;
          
          handlePdfUpload({ target: uploader });
        } else {
          showToast('不支援此檔案類型，請拖曳 PDF 格式之國語題庫檔案！', 'error');
        }
      }
    });

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `flex items-center space-x-2 px-4 py-3 rounded-xl border text-sm font-bold shadow-2xl transition duration-300 transform translate-x-10 opacity-0`;
      
      if (type === 'success') {
        toast.className += ' bg-emerald-950 border-emerald-800 text-emerald-300';
        toast.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>${message}</span>`;
      } else if (type === 'error') {
        toast.className += ' bg-red-950 border-red-800 text-red-300';
        toast.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> <span>${message}</span>`;
      } else {
        toast.className += ' bg-indigo-950 border-indigo-800 text-indigo-300';
        toast.innerHTML = `<i class="fa-solid fa-info-circle"></i> <span>${message}</span>`;
      }
      
      container.appendChild(toast);
      setTimeout(() => toast.classList.remove('translate-x-10', 'opacity-0'), 50);
      setTimeout(() => {
        toast.classList.add('translate-x-10', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    function handlePdfUpload(event) {
      const file = event.target.files[0];
      if (!file || file.type !== 'application/pdf') {
        showToast('請匯入正確的 PDF 格式題庫！', 'error');
        return;
      }

      showToast('正在載入 PDF 並解析排版結構，請稍候...', 'info');
      const fileReader = new FileReader();
      fileReader.onload = function() {
        const typedarray = new Uint8Array(this.result);
        pdfjsLib.getDocument(typedarray).promise.then(function(pdfDoc_) {
          pdfDoc = pdfDoc_;
          totalPages = pdfDoc.numPages;
          
          if (answerRenderTimeout) {
            clearTimeout(answerRenderTimeout);
          }
          
          globalLines = [];
          pageHeights = {};
          heuristicQuestions = [];
          questions = [];
          answeredHistory = [];
          historyPointer = -1;
          currentExamIndex = -1;
          
          document.getElementById('parsing-status-panel').classList.remove('hidden');
          document.getElementById('total-pages-count').textContent = totalPages;
          document.getElementById('parsed-pages-count').textContent = '0';
          document.getElementById('total-detected-questions').textContent = '0';

          startBackgroundParsingQueue(1);
        }).catch(err => {
          showToast('PDF 載入失敗：' + err.message, 'error');
        });
      };
      fileReader.readAsArrayBuffer(file);
    }

    async function startBackgroundParsingQueue(pageNum) {
      if (pageNum > totalPages) {
        // 檔案全部處理結束，關閉最後一個 activeQ 寫入資料庫
        if (pdfDoc && activeQ) {
          const lastPage = await pdfDoc.getPage(totalPages);
          const originalViewport = lastPage.getViewport({ scale: 1 });
          finalizeActiveQ(originalViewport.height);
        }

        showToast(`全書自動辨識分析完成！共建立 ${questions.length} 道國語考題！`, 'success');
        updateHistoryProgress();
        document.getElementById('btn-next-question').disabled = false;
        document.getElementById('btn-toggle-answer').disabled = false;
        
        if (currentExamIndex === -1 && questions.length > 0) {
          drawRandomQuestion();
        }
        return;
      }

      document.getElementById('parsed-pages-count').textContent = pageNum;

      try {
        const page = await pdfDoc.getPage(pageNum);
        const analysisScale = 1.5;
        const viewport = page.getViewport({ scale: analysisScale });

        const offscreenCanvas = document.createElement('canvas');
        offscreenCanvas.width = Math.round(viewport.width);
        offscreenCanvas.height = Math.round(viewport.height);
        const ctx = offscreenCanvas.getContext('2d');

        await page.render({ canvasContext: ctx, viewport: viewport }).promise;

        const originalViewport = page.getViewport({ scale: 1 });
        const pageW = originalViewport.width;
        const pageH = originalViewport.height;
        
        pageHeights[pageNum] = pageH;

        const textContent = await page.getTextContent();
        const items = textContent.items;

        let hasProcessedVector = false;

        // 核心：向量文字行抽取
        if (items && items.length > 0) {
          hasProcessedVector = true;

          const elements = items.map(item => {
            const tx = item.transform;
            const x = tx[4];
            const y = pageH - tx[5]; // 自上而下
            return {
              text: item.str.trim(),
              x: x,
              y: y,
              w: item.width,
              h: item.height
            };
          }).filter(el => el.text.length > 0);

          // 將 Y 軸差距小於 8 像素的字元，合併至同一行
          elements.sort((a, b) => a.y - b.y);
          const pageLines = [];
          elements.forEach(el => {
            let placed = false;
            for (let i = 0; i < pageLines.length; i++) {
              if (Math.abs(pageLines[i].y - el.y) < 8) {
                pageLines[i].elements.push(el);
                placed = true;
                break;
              }
            }
            if (!placed) {
              pageLines.push({ pageNum: pageNum, y: el.y, elements: [el] });
            }
          });

          pageLines.forEach(line => {
            line.elements.sort((a, b) => a.x - b.x);
            line.text = line.elements.map(e => e.text).join(" ");
          });
          pageLines.sort((a, b) => a.y - b.y);

          // 過濾頁碼與大標題
          const filteredPageLines = pageLines.filter(line => {
            const txt = line.text.trim();
            const isPageNumber = /^[-—\s]*\d+[-—\s]*$/.test(txt) && (line.y < 60 || line.y > pageH - 60);
            const isExamHeader = /國小|學年度|學期|得分|姓名|班|座號/g.test(txt) && line.y < 120;
            return !isPageNumber && !isExamHeader;
          });

          globalLines.push(...filteredPageLines);
          partitionGlobalQuestions();
        }

        // 純掃描圖片考卷降級處理
        if (!hasProcessedVector) {
          const detectedHeuristic = await localHeuristicLayoutParser(offscreenCanvas, offscreenCanvas.width, offscreenCanvas.height);
          detectedHeuristic.forEach((item, index) => {
            heuristicQuestions.push({
              id: `auto-${pageNum}-${index}-${Date.now()}`,
              title: `第 ${pageNum} 頁 - 考題 ${index + 1} (掃描)`,
              qParts: [{
                pageNum: pageNum,
                box: {
                  x: (item.question_box.xmin / 1000) * pageW,
                  y: (item.question_box.ymin / 1000) * pageH,
                  w: ((item.question_box.xmax - item.question_box.xmin) / 1000) * pageW,
                  h: ((item.question_box.ymax - item.question_box.ymin) / 1000) * pageH
                }
              }],
              aParts: [{
                pageNum: pageNum,
                box: {
                  x: (item.answer_box.xmin / 1000) * pageW,
                  y: (item.answer_box.ymin / 1000) * pageH,
                  w: ((item.answer_box.xmax - item.answer_box.xmin) / 1000) * pageW,
                  h: ((item.answer_box.ymax - item.answer_box.ymin) / 1000) * pageH
                }
              }]
            });
          });
          questions = [...questions, ...heuristicQuestions];
          document.getElementById('total-detected-questions').textContent = questions.length;
        }

        if (pageNum === 1 && questions.length > 0) {
          document.getElementById('btn-next-question').disabled = false;
          document.getElementById('btn-toggle-answer').disabled = false;
          drawRandomQuestion();
        }

      } catch (err) {
        console.error(`Page ${pageNum} parsing failed:`, err);
      }

      setTimeout(() => startBackgroundParsingQueue(pageNum + 1), 30);
    }

    // 將當前正在收集的 activeQ 儲存並寫入題庫
    function finalizeActiveQ(originalPageHeight) {
      if (!activeQ) return;
      
      // 分別對 question 與 answer 片段計算精準包絡線 Box
      const qPartsFinal = [];
      activeQ.qParts.forEach(p => {
        const box = calculateBoxFromElements(p.elements);
        if (box) qPartsFinal.push({ pageNum: p.pageNum, box: box });
      });

      const aPartsFinal = [];
      activeQ.aParts.forEach(p => {
        const box = calculateBoxFromElements(p.elements);
        if (box) aPartsFinal.push({ pageNum: p.pageNum, box: box });
      });

      // 防漏 Failsafe：如果解析完題目卻沒有半點答案標記，強制在題目下方切分出一塊預設高度作為答案，保證絕不漏題
      if (qPartsFinal.length > 0 && aPartsFinal.length === 0) {
        const lastPart = qPartsFinal[qPartsFinal.length - 1];
        aPartsFinal.push({
          pageNum: lastPart.pageNum,
          box: {
            x: lastPart.box.x,
            y: Math.min(originalPageHeight - 120, lastPart.box.y + lastPart.box.h + 5),
            w: lastPart.box.w,
            h: 100
          }
        });
      }

      if (qPartsFinal.length > 0) {
        questions.push({
          id: activeQ.id,
          title: activeQ.title,
          qParts: qPartsFinal,
          aParts: aPartsFinal
        });
      }
      activeQ = null;
    }

    // ==========================================
    // 奈米級全域文字序列切分與屏蔽關聯器
    // ==========================================
    function partitionGlobalQuestions() {
      const qIndices = [];
      // 超級高寬容度題號正則式：完整支援並涵蓋半形、全形 period 標點、全形括號以及編號後空格等多種格式
      const qRegex = /^\s*(\d+|[一二三四五六七八九十百]+)\s*([\.．、\s：:]|[\(（]\s*[\)）])|^\s*[\(（【\[]\s*(\d+|[一二三四五六七八九十百]+)\s*[\)）】\]]/;
      const aRegex = /《答案》|【答案】|答案[：:]|詳解[：:]|解析[：:]/;
      const headerRegex = /每題|共\s*\d|分\s*[\)：)]|選擇題|字音字形|延伸成語|填充題|配合題|閱讀|綜合|題型|大題|注意事項|試卷|考卷/;

      // 1. 識別所有的核心題號線條起點
      for (let i = 0; i < globalLines.length; i++) {
        const line = globalLines[i];
        const isHeader = headerRegex.test(line.text);
        if (qRegex.test(line.text) && !isHeader && !aRegex.test(line.text)) {
          qIndices.push(i);
        }
      }

      const parsedQuestions = [];

      // 2. 基於題號區間做絕對座標段落包絡
      for (let k = 0; k < qIndices.length; k++) {
        const qStartIndex = qIndices[k];
        const nextQIndex = (k < qIndices.length - 1) ? qIndices[k + 1] : globalLines.length;

        // 尋找此題號範圍內的第一個答案標記
        let aIndex = -1;
        for (let i = qStartIndex; i < nextQIndex; i++) {
          if (aRegex.test(globalLines[i].text)) {
            aIndex = i;
            break;
          }
        }

        // 題目行與答案行進行絕對、物理性的索引切分，徹底根絕滲漏下一題文字
        const qLines = globalLines.slice(qStartIndex, (aIndex !== -1) ? aIndex : nextQIndex);
        const aLines = (aIndex !== -1) ? globalLines.slice(aIndex, nextQIndex) : [];

        // 題目片段按 Page 封裝
        const qPartsByPage = {};
        qLines.forEach(line => {
          if (!qPartsByPage[line.pageNum]) qPartsByPage[line.pageNum] = [];
          qPartsByPage[line.pageNum].push(...line.elements);
        });

        const qPartsFinal = [];
        Object.keys(qPartsByPage).forEach(pNum => {
          const pageNum = parseInt(pNum);
          const box = calculateBoxFromElements(qPartsByPage[pageNum]);
          if (box) qPartsFinal.push({ pageNum, box });
        });

        // 答案與解析片段按 Page 封裝
        const aPartsByPage = {};
        aLines.forEach(line => {
          if (!aPartsByPage[line.pageNum]) aPartsByPage[line.pageNum] = [];
          aPartsByPage[line.pageNum].push(...line.elements);
        });

        const aPartsFinal = [];
        Object.keys(aPartsByPage).forEach(pNum => {
          const pageNum = parseInt(pNum);
          const box = calculateBoxFromElements(aPartsByPage[pageNum]);
          if (box) aPartsFinal.push({ pageNum, box });
        });

        // Failsafe 未探測到答案的防空空白兜底
        if (qPartsFinal.length > 0 && aPartsFinal.length === 0) {
          const lastPart = qPartsFinal[qPartsFinal.length - 1];
          const lastPageH = pageHeights[lastPart.pageNum] || 842;
          aPartsFinal.push({
            pageNum: lastPart.pageNum,
            box: {
              x: lastPart.box.x,
              y: Math.min(lastPageH - 120, lastPart.box.y + lastPart.box.h + 5),
              w: lastPart.box.w,
              h: 80
            }
          });
        }

        if (qPartsFinal.length > 0) {
          const firstLineText = globalLines[qStartIndex].text;
          const title = `第 ${qPartsFinal[0].pageNum} 頁 - 考題 (${firstLineText.substring(0, 15).trim()}...)`;
          const id = `q-${qPartsFinal[0].pageNum}-${firstLineText.replace(/\s+/g, "").substring(0, 10)}`;

          parsedQuestions.push({
            id,
            title,
            qParts: qPartsFinal,
            aParts: aPartsFinal
          });
        }
      }

      // 合併向量題與掃描題
      questions = [...parsedQuestions, ...heuristicQuestions];
      document.getElementById('total-detected-questions').textContent = questions.length;
    }

    // 計算精準包絡線 Box（排除紙張白邊，達成左右不留白）
    function calculateBoxFromElements(elements) {
      if (!elements || elements.length === 0) return null;
      let minX = Infinity;
      let maxX = -Infinity;
      let minY = Infinity;
      let maxY = -Infinity;
      elements.forEach(el => {
        const top = el.y - (el.h || 12);
        const bottom = el.y + 4;
        const left = el.x;
        const right = el.x + el.w;
        if (left < minX) minX = left;
        if (right > maxX) maxX = right;
        if (top < minY) minY = top;
        if (bottom > maxY) maxY = bottom;
      });
      if (minX === Infinity) return null;
      // 微調邊界，左右外托 12px 預防字體邊緣鋸齒裁剪
      return {
        x: Math.max(0, minX - 12),
        y: Math.max(0, minY - 2),
        w: (maxX - minX) + 24,
        h: (maxY - minY) + 4
      };
    }

    // Heuristic 輔助分割投影（針對圖片掃描檔）
    async function localHeuristicLayoutParser(canvas, width, height) {
      width = Math.round(width);
      height = Math.round(height);

      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, width, height);
      const data = imgData.data;

      const scanLeft = Math.round(width * 0.15);
      const scanRight = Math.round(width * 0.85);
      const scanWidth = scanRight - scanLeft;

      const rowBrightness = new Array(height).fill(0);
      for (let y = 0; y < height; y++) {
        let whitePixels = 0;
        for (let x = scanLeft; x < scanRight; x++) {
          const idx = (y * width + x) * 4;
          const r = data[idx];
          const g = data[idx + 1];
          const b = data[idx + 2];
          
          if (r > 235 && g > 235 && b > 235) {
            whitePixels++;
          }
        }
        rowBrightness[y] = whitePixels / scanWidth;
      }

      const splits = [0];
      const threshold = 0.96; 
      let minGapSize = Math.max(10, Math.round(height * 0.015));
      let currentGap = 0;

      for (let y = 0; y < height; y++) {
        if (rowBrightness[y] >= threshold) {
          currentGap++;
        } else {
          if (currentGap >= minGapSize) {
            splits.push(y - Math.round(currentGap / 2));
          }
          currentGap = 0;
        }
      }
      splits.push(height);

      let detected = [];
      for (let i = 0; i < splits.length - 1; i++) {
        const top = splits[i];
        const bottom = splits[i+1];
        const h = bottom - top;
        
        if (h > height * 0.06 && h < height * 0.45) {
          const mid = top + Math.round(h * 0.45);
          detected.push({ top, mid, bottom });
        } else if (h >= height * 0.45) {
          const half = Math.round(h / 2);
          const mid1 = top + Math.round(half * 0.45);
          const mid2 = (top + half) + Math.round(half * 0.45);
          detected.push({ top: top, mid: mid1, bottom: top + half });
          detected.push({ top: top + half, mid: mid2, bottom: bottom });
        }
      }

      if (detected.length === 0) {
        const numParts = 4;
        const partHeight = Math.round(height / numParts);
        for (let i = 0; i < numParts; i++) {
          const top = i * partHeight;
          const bottom = (i + 1) * partHeight;
          const h = bottom - top;
          const mid = top + Math.round(h * 0.45);
          detected.push({ top, mid, bottom });
        }
      }

      return detected.map(d => ({
        question_box: {
          ymin: Math.round((d.top / height) * 1000),
          xmin: 80,
          ymax: Math.round((d.mid / height) * 1000),
          xmax: 920
        },
        answer_box: {
          ymin: Math.round((d.mid / height) * 1000),
          xmin: 80,
          ymax: Math.round((d.bottom / height) * 1000),
          xmax: 920
        }
      }));
    }

    // ==========================================
    // 隨機出題控制與上一題導覽（雙向零毫秒閃爍控制）
    // ==========================================
    function drawRandomQuestion() {
      if (questions.length === 0) {
        showToast('題庫無資料可供隨機抽題！', 'error');
        return;
      }

      if (answerRenderTimeout) {
        clearTimeout(answerRenderTimeout);
      }

      showAnswer = false;
      const mask = document.getElementById('exam-a-masked-layer');
      if (mask) {
        mask.style.display = "flex";
      }
      document.getElementById('answer-btn-text').textContent = "顯示解析與答案";
      document.getElementById('eye-icon').className = "fa-solid fa-eye";

      const aCanvas = document.getElementById('exam-a-canvas');
      if (aCanvas) {
        const ctx = aCanvas.getContext('2d');
        ctx.clearRect(0, 0, aCanvas.width, aCanvas.height);
        aCanvas.width = 0;
        aCanvas.height = 0;
      }
      const qCanvas = document.getElementById('exam-q-canvas');
      if (qCanvas) {
        const ctx = qCanvas.getContext('2d');
        ctx.clearRect(0, 0, qCanvas.width, qCanvas.height);
        qCanvas.width = 0;
        qCanvas.height = 0;
      }

      if (historyPointer < answeredHistory.length - 1) {
        historyPointer++;
        const qId = answeredHistory[historyPointer];
        currentExamIndex = questions.findIndex(q => q.id === qId);
        const q = questions[currentExamIndex];

        resetExamOffsets('q');
        resetExamOffsets('a');
        renderExamItem(q);
        updateHistoryProgress();
        return;
      }

      const pool = questions.filter(q => !answeredHistory.includes(q.id));

      if (pool.length === 0) {
        showToast('🎉 本題庫所有題目都已經出完囉！已自動重設抽題進度！', 'success');
        answeredHistory = [];
        historyPointer = -1;
        drawRandomQuestion();
        return;
      }

      const randIndex = Math.floor(Math.random() * pool.length);
      const chosenQ = pool[randIndex];
      
      currentExamIndex = questions.findIndex(q => q.id === chosenQ.id);
      answeredHistory.push(chosenQ.id);
      historyPointer = answeredHistory.length - 1;

      document.getElementById('exam-q-placeholder').classList.add('hidden');
      document.getElementById('exam-a-placeholder').classList.add('hidden');

      resetExamOffsets('q');
      resetExamOffsets('a');

      renderExamItem(chosenQ);
      updateHistoryProgress();
    }

    function drawPrevQuestion() {
      if (historyPointer > 0) {
        historyPointer--;
        const qId = answeredHistory[historyPointer];
        currentExamIndex = questions.findIndex(q => q.id === qId);
        const q = questions[currentExamIndex];

        if (answerRenderTimeout) {
          clearTimeout(answerRenderTimeout);
        }

        showAnswer = false;
        const mask = document.getElementById('exam-a-masked-layer');
        if (mask) {
          mask.style.display = "flex";
        }
        document.getElementById('answer-btn-text').textContent = "顯示解析與答案";
        document.getElementById('eye-icon').className = "fa-solid fa-eye";

        const aCanvas = document.getElementById('exam-a-canvas');
        if (aCanvas) {
          const ctx = aCanvas.getContext('2d');
          ctx.clearRect(0, 0, aCanvas.width, aCanvas.height);
          aCanvas.width = 0;
          aCanvas.height = 0;
        }
        const qCanvas = document.getElementById('exam-q-canvas');
        if (qCanvas) {
          const ctx = qCanvas.getContext('2d');
          ctx.clearRect(0, 0, qCanvas.width, qCanvas.height);
          qCanvas.width = 0;
          qCanvas.height = 0;
        }

        resetExamOffsets('q');
        resetExamOffsets('a');
        renderExamItem(q);
        updateHistoryProgress();
      }
    }

    function updateHistoryProgress() {
      const bar = document.getElementById('history-progress');
      const text = document.getElementById('history-text');
      const prevBtn = document.getElementById('btn-prev-question');
      
      if (questions.length === 0) {
        bar.style.width = '0%';
        text.textContent = '0 / 0 題已出';
        prevBtn.disabled = true;
        return;
      }
      
      const pct = (answeredHistory.length / questions.length) * 100;
      bar.style.width = `${pct}%`;
      text.textContent = `${answeredHistory.length} / ${questions.length} 題已回答`;
      
      prevBtn.disabled = (historyPointer <= 0);
    }

    function resetHistory() {
      answeredHistory = [];
      historyPointer = -1;
      updateHistoryProgress();
      showToast('出題歷史記錄已重設！');
    }

    function toggleAnswerVisibility() {
      if (currentExamIndex === -1) {
        showToast('請先隨機抽一題！', 'info');
        return;
      }
      showAnswer = !showAnswer;
      const mask = document.getElementById('exam-a-masked-layer');
      const btnText = document.getElementById('answer-btn-text');
      const icon = document.getElementById('eye-icon');

      if (showAnswer) {
        mask.style.display = "none";
        btnText.textContent = "隱藏解析與答案";
        icon.className = "fa-solid fa-eye-slash";
      } else {
        mask.style.display = "flex";
        btnText.textContent = "顯示解析與答案";
        icon.className = "fa-solid fa-eye";
      }
    }

    // ==========================================
    // 渲染與離屏智慧延時裁切功能
    // ==========================================
    function renderExamItem(q) {
      if (!pdfDoc) return;
      
      // 1. 題目部分：立即開始解圖並渲染
      renderParts(q.qParts, 'q');
      
      // 2. 答案部分：採取「延遲 1,000 毫秒（1秒）」的物理防護排程
      if (answerRenderTimeout) {
        clearTimeout(answerRenderTimeout);
      }
      
      answerRenderTimeout = setTimeout(() => {
        renderParts(q.aParts, 'a');
      }, 1000); 
    }

    async function renderParts(parts, targetType, useCache = false) {
      const targetCanvas = document.getElementById(`exam-${targetType}-canvas`);
      const ctx = targetCanvas.getContext('2d');
      const container = document.getElementById(`exam-${targetType}-container`);
      
      if (!parts || parts.length === 0) {
        targetCanvas.width = 0;
        targetCanvas.height = 0;
        return;
      }

      const containerWidth = container.clientWidth || 800;
      const containerHeight = container.clientHeight || 300;
      const conf = examOffsets[targetType];
      const pad = conf.padding;

      let maxW = 0;
      let totalH = 0;
      parts.forEach(part => {
        if (part.box.w > maxW) maxW = part.box.w;
        totalH += part.box.h;
      });

      const partSpacing = 15;
      const totalSpacing = (parts.length - 1) * partSpacing;
      const fullH = totalH + totalSpacing;

      const padX = pad;
      const padY = 0; 

      const ratioX = containerWidth / (maxW + padX * 2);
      const ratioY = containerHeight / (fullH + padY * 2);

      let bestRatio;
      if (targetType === 'q') {
        bestRatio = ratioX * conf.scale;
        currentBestRatioQ = bestRatio; // 即時記錄縮放比
      } else {
        bestRatio = Math.min(ratioX, ratioY) * conf.scale;
        currentBestRatioA = bestRatio; // 即時記錄縮放比
      }

      const finalW = (maxW + padX * 2) * bestRatio;
      const finalH = (fullH + padY * 2) * bestRatio;

      targetCanvas.width = Math.round(finalW);
      targetCanvas.height = Math.round(finalH);

      targetCanvas.style.maxWidth = "100%";
      targetCanvas.style.maxHeight = "100%";
      targetCanvas.style.objectFit = "contain";

      ctx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';

      let currentYOffset = 0;

      // 重設或讀取離屏 Canvas 暫存
      if (targetType === 'q' && !useCache) cachedCanvasesQ = [];
      if (targetType === 'a' && !useCache) cachedCanvasesA = [];

      for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        let sourceCanvas;

        if (useCache) {
          sourceCanvas = (targetType === 'q') ? cachedCanvasesQ[i] : cachedCanvasesA[i];
        }

        if (!sourceCanvas) {
          const page = await pdfDoc.getPage(part.pageNum);
          const highResScale = 3.0; 
          const viewport = page.getViewport({ scale: highResScale });

          sourceCanvas = document.createElement('canvas');
          sourceCanvas.width = Math.round(viewport.width);
          sourceCanvas.height = Math.round(viewport.height);
          const sourceCtx = sourceCanvas.getContext('2d');

          await page.render({ canvasContext: sourceCtx, viewport: viewport }).promise;

          if (targetType === 'q') cachedCanvasesQ[i] = sourceCanvas;
          else cachedCanvasesA[i] = sourceCanvas;
        }

        const horizontalCenteringOffset = (maxW - part.box.w) / 2;

        const highResScale = 3.0;
        const srcX = (part.box.x * highResScale) - (padX * highResScale) + (conf.x * highResScale);
        const srcY = (part.box.y * highResScale) - (padY * highResScale) + (conf.y * highResScale);
        const srcW = (part.box.w * highResScale) + (padX * 2 * highResScale);
        const srcH = (part.box.h * highResScale) + (padY * 2 * highResScale);

        const destX = (horizontalCenteringOffset + padX) * bestRatio;
        const destY = currentYOffset * bestRatio;
        const destW = part.box.w * bestRatio;
        const destH = part.box.h * bestRatio;

        ctx.drawImage(
          sourceCanvas,
          srcX, srcY, srcW / conf.scale, srcH / conf.scale,
          destX, destY, destW, destH
        );

        currentYOffset += part.box.h + partSpacing;
      }
    }

    // ==========================================
    // 精準拉把動態拖拉與範圍變更 (Drag Handles)
    // ==========================================
    window.addEventListener('load', function() {
      initExamResizeHandles();
    });

    function initExamResizeHandles() {
      let isDraggingHandle = false;
      let activeHandle = null;
      let activeTargetType = null; // 'q' or 'a'
      let startX = 0, startY = 0;
      let startBox = {};

      document.addEventListener('mousedown', function(e) {
        if (e.target.classList.contains('resize-handle') && e.target.closest('#exam-workspace')) {
          isDraggingHandle = true;
          activeHandle = e.target.getAttribute('data-handle');
          activeTargetType = e.target.getAttribute('data-target');
          
          startX = e.clientX;
          startY = e.clientY;

          const q = questions[currentExamIndex];
          if (!q) return;

          // 獲取該目標當前第一個分頁的原始裁剪範圍
          const part = (activeTargetType === 'q') ? q.qParts[0] : q.aParts[0];
          if (!part) return;

          startBox = { ...part.box };

          document.addEventListener('mousemove', handleResizeDrag);
          document.addEventListener('mouseup', stopResizeDrag);
          e.preventDefault();
          e.stopPropagation();
        }
      });

      function handleResizeDrag(e) {
        if (!isDraggingHandle || currentExamIndex === -1) return;

        const q = questions[currentExamIndex];
        const part = (activeTargetType === 'q') ? q.qParts[0] : q.aParts[0];
        if (!part) return;

        const deltaX = e.clientX - startX;
        const deltaY = e.clientY - startY;

        // 利用當前比例將螢幕像素轉換為 PDF 座標像素
        const ratio = (activeTargetType === 'q') ? currentBestRatioQ : currentBestRatioA;
        const deltaX_pdf = deltaX / ratio;
        const deltaY_pdf = deltaY / ratio;

        // 基於拉動的方向，奈米級調校 box 的起點 (x, y) 或高寬 (w, h)
        if (activeHandle.includes('right')) {
          part.box.w = Math.max(30, startBox.w + deltaX_pdf);
        }
        if (activeHandle.includes('left')) {
          const maxLeftX = startBox.x + startBox.w - 30;
          part.box.x = Math.min(maxLeftX, startBox.x + deltaX_pdf);
          part.box.w = Math.max(30, startBox.w - (part.box.x - startBox.x));
        }
        if (activeHandle.includes('bottom')) {
          part.box.h = Math.max(30, startBox.h + deltaY_pdf);
        }
        if (activeHandle.includes('top')) {
          const maxTopY = startBox.y + startBox.h - 30;
          part.box.y = Math.min(maxTopY, startBox.y + deltaY_pdf);
          part.box.h = Math.max(30, startBox.h - (part.box.y - startBox.y));
        }

        // 以快取 Canvas 進行 60FPS 渲染，毫無延遲，且不洩漏答案
        renderParts((activeTargetType === 'q') ? q.qParts : q.aParts, activeTargetType, true);
      }

      function stopResizeDrag() {
        isDraggingHandle = false;
        document.removeEventListener('mousemove', handleResizeDrag);
        document.removeEventListener('mouseup', stopResizeDrag);
      }
    }

    // ==========================================
    // 螢幕平移控制
    // ==========================================
    function startExamPan(e, type) {
      if (currentExamIndex === -1) return;
      // 避開拉把的滑動干擾
      if (e.target.classList.contains('resize-handle')) return;
      
      isPanning = true;
      panTarget = type;
      
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      
      lastPanX = clientX;
      lastPanY = clientY;

      document.addEventListener('mousemove', handleExamPan);
      document.addEventListener('mouseup', endExamPan);
      document.addEventListener('touchmove', handleExamPan);
      document.addEventListener('touchend', endExamPan);
    }

    function handleExamPan(e) {
      if (!isPanning) return;
      
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      const deltaX = clientX - lastPanX;
      const deltaY = clientY - lastPanY;

      lastPanX = clientX;
      lastPanY = clientY;

      const sensitivity = 0.5;
      examOffsets[panTarget].x -= deltaX * sensitivity;
      examOffsets[panTarget].y -= deltaY * sensitivity;

      if (currentExamIndex !== -1) {
        const q = questions[currentExamIndex];
        renderParts((panTarget === 'q') ? q.qParts : q.aParts, panTarget, true);
      }
    }

    function endExamPan() {
      isPanning = false;
      document.removeEventListener('mousemove', handleExamPan);
      document.removeEventListener('mouseup', endExamPan);
      document.removeEventListener('touchmove', handleExamPan);
      document.removeEventListener('touchend', endExamPan);
    }

    function adjustExamZoom(type, val) {
      examOffsets[type].scale = parseFloat(val);
      document.getElementById(`zoom-${type}-val`).textContent = `${Math.round(val * 100)}%`;
      if (currentExamIndex !== -1) {
        const q = questions[currentExamIndex];
        renderParts((type === 'q') ? q.qParts : q.aParts, type, true);
      }
    }

    function adjustExamPadding(type, val) {
      examOffsets[type].padding = parseInt(val);
      document.getElementById(`pad-${type}-val`).textContent = `${val}px`;
      if (currentExamIndex !== -1) {
        const q = questions[currentExamIndex];
        renderParts((type === 'q') ? q.qParts : q.aParts, type, true);
      }
    }

    function resetExamOffsets(type) {
      examOffsets[type].x = 0;
      examOffsets[type].y = 0;
      examOffsets[type].scale = 1.0;
      examOffsets[type].padding = 10;

      document.getElementById(`zoom-${type}-slider`).value = 1.0;
      document.getElementById(`zoom-${type}-val`).textContent = "100%";
      document.getElementById(`pad-${type}-slider`).value = 10;
      document.getElementById('pad-q-slider').value = 10;
      document.getElementById('pad-a-slider').value = 10;
      document.getElementById(`pad-${type}-val`).textContent = "10px";

      if (currentExamIndex !== -1) {
        const q = questions[currentExamIndex];
        renderParts((type === 'q') ? q.qParts : q.aParts, type, true);
      }
    }

    function triggerDemoMode() {
      showToast('正在預載示範 PDF 並啟動排版分析隊列...', 'info');
      const demoUrl = 'https://raw.githubusercontent.com/mozilla/pdf.js/ba2edeae/web/compressed.tracemonkey-pldi-09.pdf';
      
      pdfjsLib.getDocument(demoUrl).promise.then(function(pdfDoc_) {
        pdfDoc = pdfDoc_;
        totalPages = pdfDoc.numPages;
        
        if (answerRenderTimeout) {
          clearTimeout(answerRenderTimeout);
        }
        
        globalLines = [];
        pageHeights = {};
        heuristicQuestions = [];
        questions = [];
        answeredHistory = [];
        historyPointer = -1;
        currentExamIndex = -1;
        activeQ = null;
        
        document.getElementById('parsing-status-panel').classList.remove('hidden');
        document.getElementById('total-pages-count').textContent = totalPages;
        document.getElementById('parsed-pages-count').textContent = '0';
        document.getElementById('total-detected-questions').textContent = '0';

        startBackgroundParsingQueue(1);
      }).catch(err => {
        showToast('示範檔載入失敗，建議拖入您手邊的 PDF 試卷。', 'error');
      });
    }

    let resizeTimer;
    window.addEventListener('resize', function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (currentExamIndex !== -1) {
          renderExamItem(questions[currentExamIndex]);
        }
      }, 150);
    });
  </script>
</body>
